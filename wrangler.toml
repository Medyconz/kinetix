name = "kinetix"
main = "worker.js"
compatibility_date = "2026-05-14"
compatibility_flags = ["nodejs_compat_v2"]
workers_dev = true

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
SESSION_TTL_SECONDS = "86400"
